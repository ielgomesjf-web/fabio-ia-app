<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#7c5cfc" />
    <meta name="background-color" content="#080d19" />
    <meta name="description" content="Fabio IA - Plataforma de agentes autônomos de IA para solopreneurs. Analytics, automação e gestão inteligente." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fabio IA" />
    <meta name="application-name" content="Fabio IA" />
    <meta name="msapplication-TileColor" content="#7c5cfc" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>Fabio IA - Agentes Autonomos</title>

    <!-- Splash screens for iOS -->
    <style>
      /* Prevent FOUC */
      html { background-color: #080d19; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[App] Service Worker registered:', reg.scope);
              // Check for updates
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'activated') {
                    console.log('[App] New SW activated, refresh for updates');
                  }
                });
              });
            })
            .catch((err) => console.log('[App] SW registration failed:', err));
        });
      }
    </script>
    <noscript>
      <div style="background:#080d19;color:#eaf0ff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;text-align:center;padding:20px;">
        <div>
          <h1 style="font-size:24px;margin-bottom:10px;">Fabio IA</h1>
          <p style="color:#7b8ba8;">Este aplicativo requer JavaScript habilitado para funcionar.</p>
        </div>
      </div>
    </noscript>
  </body>
</html>
