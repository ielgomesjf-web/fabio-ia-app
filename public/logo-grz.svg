<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 120" width="550" height="120">
  <defs>
    <filter id="gc" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="rb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6fff"/>
      <stop offset="50%" style="stop-color:#6b4fcf"/>
      <stop offset="100%" style="stop-color:#4a2fa0"/>
    </linearGradient>
    <linearGradient id="rb2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cfc"/>
      <stop offset="100%" style="stop-color:#3a1f80"/>
    </linearGradient>
    <linearGradient id="eg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#00b8d4"/>
    </linearGradient>
    <linearGradient id="lg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8a4ff"/>
      <stop offset="40%" style="stop-color:#7c5cfc"/>
      <stop offset="100%" style="stop-color:#5a3de8"/>
    </linearGradient>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#7c5cfc;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b7dff"/>
      <stop offset="50%" style="stop-color:#7c5cfc"/>
      <stop offset="100%" style="stop-color:#5a3de8"/>
    </linearGradient>
  </defs>

  <!-- Robot mascot -->
  <g transform="translate(8, 5)">
    <line x1="48" y1="10" x2="48" y2="-2" stroke="#7c5cfc" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="48" cy="-5" r="4" fill="#00d4ff" filter="url(#gc)"/>
    <rect x="12" y="10" width="72" height="55" rx="16" fill="url(#rb)"/>
    <rect x="20" y="22" width="56" height="30" rx="10" fill="#0d0d2a"/>
    <g opacity="0.35">
      <circle cx="48" cy="37" r="11" fill="none" stroke="#00d4ff" stroke-width="0.6"/>
      <circle cx="48" cy="37" r="7" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.6"/>
      <path d="M48,37 L48,26 A11,11 0 0,1 57,31 Z" fill="url(#rg)" opacity="0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 48 37" to="360 48 37" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>
    <ellipse cx="36" cy="36" rx="7" ry="8" fill="#0a0a2a"/>
    <ellipse cx="60" cy="36" rx="7" ry="8" fill="#0a0a2a"/>
    <ellipse cx="36" cy="36" rx="5" ry="6" fill="url(#eg)" filter="url(#gc)"/>
    <ellipse cx="60" cy="36" rx="5" ry="6" fill="url(#eg)" filter="url(#gc)"/>
    <ellipse cx="34" cy="34" rx="2" ry="2.5" fill="white" opacity="0.7"/>
    <ellipse cx="58" cy="34" rx="2" ry="2.5" fill="white" opacity="0.7"/>
    <rect x="5" y="28" width="8" height="16" rx="3" fill="url(#pg)"/>
    <rect x="83" y="28" width="8" height="16" rx="3" fill="url(#pg)"/>
    <path d="M38,52 Q48,60 58,52" fill="none" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
    <rect x="38" y="65" width="20" height="8" rx="3" fill="#4a2fa0"/>
    <rect x="16" y="72" width="64" height="38" rx="10" fill="url(#rb2)"/>
    <rect x="26" y="78" width="44" height="24" rx="6" fill="#1a1040" opacity="0.7"/>
    <g transform="translate(48, 90)">
      <circle cx="0" cy="0" r="9" fill="none" stroke="#00d4ff" stroke-width="0.7" opacity="0.4"/>
      <circle cx="0" cy="0" r="6" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
      <circle cx="0" cy="0" r="2" fill="#00d4ff" opacity="0.6"/>
      <path d="M0,0 L0,-9 A9,9 0 0,1 7,-6 Z" fill="url(#rg)" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
      </path>
      <circle cx="4" cy="-5" r="1" fill="#00d4ff" opacity="0.8">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- GRZ Letters -->
  <text x="130" y="78" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="88" fill="url(#lg)" letter-spacing="-2">GRZ</text>
  <line x1="133" y1="88" x2="365" y2="88" stroke="#00d4ff" stroke-width="2" filter="url(#gc)" opacity="0.5"/>
  <text x="135" y="108" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="16" fill="#00d4ff" filter="url(#gc)" letter-spacing="4" opacity="0.75">GESTÃO RISCO ZERO</text>

  <g transform="translate(380, 100)" opacity="0.45">
    <circle cx="0" cy="0" r="6" fill="none" stroke="#00d4ff" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="3.5" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="1.5" fill="#00d4ff"/>
    <line x1="0" y1="0" x2="4" y2="-4" stroke="#00d4ff" stroke-width="0.8"/>
  </g>
</svg>