<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #080d19 0%, #1a1040 40%, #0d1a2e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Arial Black', Impact, sans-serif;
  overflow: hidden;
  position: relative;
}

/* Grid background */
.grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(124,92,252,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,92,252,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Glow orbs */
.orb1 {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(124,92,252,0.15) 0%, transparent 70%);
  top: -50px;
  right: 100px;
  border-radius: 50%;
}
.orb2 {
  position: absolute;
  width: 250px;
  height: 250px;
  background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%);
  bottom: -30px;
  left: 80px;
  border-radius: 50%;
}

.content {
  display: flex;
  align-items: center;
  gap: 60px;
  z-index: 1;
}

/* Robot SVG container */
.robot {
  flex-shrink: 0;
}

.text-side {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.grz-text {
  font-size: 160px;
  font-weight: 900;
  background: linear-gradient(180deg, #b8a4ff 0%, #7c5cfc 40%, #5a3de8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -4px;
  line-height: 1;
}

.subtitle {
  font-family: Arial, Helvetica, sans-serif;
  font-weight: 400;
  font-size: 32px;
  color: #00d4ff;
  letter-spacing: 6px;
  text-shadow: 0 0 20px rgba(0,212,255,0.4);
}

.tagline {
  font-family: Arial, Helvetica, sans-serif;
  font-weight: 300;
  font-size: 18px;
  color: rgba(124,92,252,0.6);
  letter-spacing: 4px;
  margin-top: 8px;
}

.cyan-line {
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, #00d4ff, rgba(0,212,255,0.1));
  border-radius: 2px;
  box-shadow: 0 0 12px rgba(0,212,255,0.4);
}

/* Corner accents */
.corner {
  position: absolute;
  width: 40px;
  height: 40px;
  border-color: rgba(124,92,252,0.3);
  border-style: solid;
}
.corner.tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
.corner.tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
.corner.bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
.corner.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="orb1"></div>
<div class="orb2"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="content">
  <!-- Robot mascot SVG -->
  <div class="robot">
    <svg width="280" height="380" viewBox="0 0 100 135">
      <defs>
        <filter id="gc" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="rb" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#8b6fff"/>
          <stop offset="50%" style="stop-color:#6b4fcf"/>
          <stop offset="100%" style="stop-color:#4a2fa0"/>
        </linearGradient>
        <linearGradient id="rb2" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#7c5cfc"/>
          <stop offset="100%" style="stop-color:#3a1f80"/>
        </linearGradient>
        <linearGradient id="eg" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#00f0ff"/>
          <stop offset="100%" style="stop-color:#00b8d4"/>
        </linearGradient>
        <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#9b7dff"/>
          <stop offset="50%" style="stop-color:#7c5cfc"/>
          <stop offset="100%" style="stop-color:#5a3de8"/>
        </linearGradient>
        <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.7"/>
          <stop offset="100%" style="stop-color:#7c5cfc;stop-opacity:0.2"/>
        </linearGradient>
      </defs>
      <g transform="translate(2, 2)">
        <!-- Antenna -->
        <line x1="48" y1="10" x2="48" y2="-2" stroke="#7c5cfc" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="48" cy="-5" r="4.5" fill="#00d4ff" filter="url(#gc)"/>
        <circle cx="48" cy="-5" r="2" fill="#fff" opacity="0.5"/>

        <!-- Head -->
        <rect x="12" y="10" width="72" height="55" rx="16" fill="url(#rb)"/>
        <rect x="20" y="22" width="56" height="30" rx="10" fill="#0d0d2a"/>
        <!-- Radar in visor -->
        <g opacity="0.4">
          <circle cx="48" cy="37" r="12" fill="none" stroke="#00d4ff" stroke-width="0.6"/>
          <circle cx="48" cy="37" r="8" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.6"/>
          <circle cx="48" cy="37" r="4" fill="none" stroke="#00d4ff" stroke-width="0.4" opacity="0.4"/>
          <path d="M48,37 L48,25 A12,12 0 0,1 58,30 Z" fill="url(#rg)" opacity="0.7">
            <animateTransform attributeName="transform" type="rotate" from="0 48 37" to="360 48 37" dur="3s" repeatCount="indefinite"/>
          </path>
        </g>
        <!-- Eyes -->
        <ellipse cx="36" cy="36" rx="8" ry="9" fill="#0a0a2a"/>
        <ellipse cx="60" cy="36" rx="8" ry="9" fill="#0a0a2a"/>
        <ellipse cx="36" cy="36" rx="6" ry="7" fill="url(#eg)" filter="url(#gc)"/>
        <ellipse cx="60" cy="36" rx="6" ry="7" fill="url(#eg)" filter="url(#gc)"/>
        <ellipse cx="33" cy="33" rx="2.5" ry="3" fill="white" opacity="0.7"/>
        <ellipse cx="57" cy="33" rx="2.5" ry="3" fill="white" opacity="0.7"/>
        <!-- Ears -->
        <rect x="4" y="28" width="9" height="18" rx="4" fill="url(#pg)"/>
        <rect x="83" y="28" width="9" height="18" rx="4" fill="url(#pg)"/>
        <circle cx="8.5" cy="35" r="2" fill="#00d4ff" opacity="0.5"/>
        <circle cx="87.5" cy="35" r="2" fill="#00d4ff" opacity="0.5"/>
        <!-- Smile -->
        <path d="M37,52 Q48,62 59,52" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

        <!-- Neck -->
        <rect x="38" y="65" width="20" height="8" rx="3" fill="#4a2fa0"/>

        <!-- Body -->
        <rect x="14" y="72" width="68" height="42" rx="12" fill="url(#rb2)"/>
        <!-- Chest -->
        <rect x="24" y="78" width="48" height="28" rx="8" fill="#1a1040" opacity="0.7"/>
        <!-- Radar on chest -->
        <g transform="translate(48, 92)">
          <circle cx="0" cy="0" r="10" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
          <circle cx="0" cy="0" r="6.5" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>
          <circle cx="0" cy="0" r="3" fill="none" stroke="#00d4ff" stroke-width="0.4" opacity="0.25"/>
          <circle cx="0" cy="0" r="1.5" fill="#00d4ff" opacity="0.7"/>
          <path d="M0,0 L0,-10 A10,10 0 0,1 8,-6 Z" fill="url(#rg)" opacity="0.5">
            <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
          </path>
          <circle cx="5" cy="-6" r="1.2" fill="#00d4ff" opacity="0.8">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="-4" cy="4" r="1" fill="#00f0ff" opacity="0.6">
            <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.8s" repeatCount="indefinite"/>
          </circle>
        </g>
        <!-- LEDs -->
        <circle cx="30" cy="110" r="2.5" fill="#00d4ff" opacity="0.5">
          <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="110" r="2.5" fill="#7c5cfc" opacity="0.6">
          <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1s" begin="0.3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="50" cy="110" r="2.5" fill="#00d4ff" opacity="0.7">
          <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1s" begin="0.6s" repeatCount="indefinite"/>
        </circle>
        <circle cx="60" cy="110" r="2.5" fill="#7c5cfc" opacity="0.6">
          <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1s" begin="0.9s" repeatCount="indefinite"/>
        </circle>
        <circle cx="70" cy="110" r="2.5" fill="#00d4ff" opacity="0.5">
          <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1s" begin="1.2s" repeatCount="indefinite"/>
        </circle>

        <!-- Arms -->
        <rect x="0" y="76" width="14" height="30" rx="6" fill="url(#rb2)"/>
        <rect x="82" y="76" width="14" height="30" rx="6" fill="url(#rb2)"/>
        <!-- Hands -->
        <circle cx="7" cy="110" r="7" fill="url(#rb)" stroke="#4a2fa0" stroke-width="1.5"/>
        <circle cx="89" cy="110" r="7" fill="url(#rb)" stroke="#4a2fa0" stroke-width="1.5"/>

        <!-- Legs -->
        <rect x="24" y="114" width="18" height="14" rx="5" fill="url(#rb2)"/>
        <rect x="54" y="114" width="18" height="14" rx="5" fill="url(#rb2)"/>
        <!-- Feet -->
        <rect x="18" y="126" width="30" height="8" rx="4" fill="#4a2fa0"/>
        <rect x="48" y="126" width="30" height="8" rx="4" fill="#4a2fa0"/>
      </g>
    </svg>
  </div>

  <div class="text-side">
    <div class="grz-text">GRZ</div>
    <div class="cyan-line"></div>
    <div class="subtitle">GESTÃO RISCO ZERO</div>
    <div class="tagline">PLATAFORMA DE GESTÃO DIGITAL</div>
  </div>
</div>
</body>
</html>
